<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idrott & Hälsa – Betygsmatris 7–9</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #161920;
  --surface2: #1e2230;
  --border: #2a2f3f;
  --text: #e8eaf0;
  --text-muted: #6b7290;
  --accent: #4fffb0;
  --accent2: #ff6b6b;
  --accent3: #ffc94d;
  --A: #4fffb0;
  --B: #52d9ff;
  --C: #ffd166;
  --D: #ff9f68;
  --E: #ff6b6b;
  --F: #ff3a5c;
  --slash: #6b7290;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* HEADER */
header {
  padding: 2.5rem 3rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  gap: 2rem;
  flex-wrap: wrap;
}

.logo-block h1 {
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.03em;
}
.logo-block h1 span { color: var(--accent); }
.logo-block p {
  font-size: 0.72rem;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 0.4rem;
}

.header-actions {
  margin-left: auto;
  display: flex;
  gap: 0.75rem;
  align-items: center;
  flex-wrap: wrap;
}

button {
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  border: none;
  font-size: 0.78rem;
  letter-spacing: 0.05em;
  border-radius: 6px;
  padding: 0.55rem 1.1rem;
  transition: all 0.15s;
}

.btn-primary {
  background: var(--accent);
  color: #0d0f14;
  font-weight: 500;
}
.btn-primary:hover { background: #3de09a; transform: translateY(-1px); }

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

.btn-danger {
  background: transparent;
  color: var(--accent2);
  border: 1px solid var(--accent2)44;
}
.btn-danger:hover { background: var(--accent2)22; }

/* TOOLBAR */
.toolbar {
  padding: 1rem 3rem;
  display: flex;
  gap: 1rem;
  align-items: center;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.toolbar-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-right: -0.5rem;
}

select, input[type="text"] {
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.5rem 0.8rem;
  border-radius: 6px;
  outline: none;
  transition: border 0.15s;
}
select:focus, input[type="text"]:focus { border-color: var(--accent); }

/* LEGEND */
.legend {
  display: flex;
  gap: 1rem;
  align-items: center;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.7rem;
  color: var(--text-muted);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}

/* MAIN LAYOUT */
.main {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 0;
  min-height: calc(100vh - 200px);
}

/* SIDEBAR */
.sidebar {
  border-right: 1px solid var(--border);
  padding: 1.5rem;
  overflow-y: auto;
  max-height: calc(100vh - 200px);
  position: sticky;
  top: 0;
}

.sidebar h3 {
  font-family: 'Syne', sans-serif;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  margin-bottom: 0.8rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}

.student-list { display: flex; flex-direction: column; gap: 0.3rem; }

.student-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 0.8rem;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
}
.student-item:hover { background: var(--surface2); }
.student-item.active {
  background: var(--accent)15;
  border-color: var(--accent)44;
}
.student-item .s-name {
  font-size: 0.8rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.student-item .s-grade {
  font-size: 0.7rem;
  font-weight: 500;
  min-width: 20px;
  text-align: right;
}

.add-student-form {
  margin-top: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.add-student-form input {
  width: 100%;
  font-size: 0.78rem;
}

/* CONTENT AREA */
.content {
  padding: 2rem 2.5rem;
  overflow-y: auto;
}

.no-student {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 400px;
  gap: 1rem;
  color: var(--text-muted);
}
.no-student .big-icon { font-size: 4rem; opacity: 0.2; }
.no-student p { font-size: 0.85rem; letter-spacing: 0.05em; }

/* STUDENT HEADER */
.student-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
  flex-wrap: wrap;
  gap: 1rem;
}
.student-header h2 {
  font-family: 'Syne', sans-serif;
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: -0.02em;
}
.student-header h2 span {
  color: var(--accent);
  font-size: 1rem;
  font-weight: 400;
  margin-left: 0.5rem;
}

.final-grade-block {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
.final-grade-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
}
.final-grade-value {
  font-family: 'Syne', sans-serif;
  font-size: 2.2rem;
  font-weight: 800;
  min-width: 50px;
  text-align: center;
}

/* CATEGORY SECTION */
.category-section { margin-bottom: 2rem; }

.category-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid var(--border);
}
.category-dot {
  width: 12px; height: 12px;
  border-radius: 2px;
  flex-shrink: 0;
}
.category-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.category-avg {
  margin-left: auto;
  font-size: 0.72rem;
  color: var(--text-muted);
}

/* MOMENT GRID */
.moments-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 0.75rem;
}

.moment-card {
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 0.9rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.65rem;
  transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  box-shadow: 0 2px 8px #0005;
}
.moment-card:hover {
  border-color: #4a5070;
  box-shadow: 0 4px 16px #0008;
}
.moment-card.has-grade-A { background: #0d2018; border-color: var(--A)99; box-shadow: 0 2px 12px var(--A)18; }
.moment-card.has-grade-B { background: #0b1e2a; border-color: var(--B)99; box-shadow: 0 2px 12px var(--B)18; }
.moment-card.has-grade-C { background: #2a2010; border-color: var(--C)99; box-shadow: 0 2px 12px var(--C)18; }
.moment-card.has-grade-D { background: #2a1a0d; border-color: var(--D)99; box-shadow: 0 2px 12px var(--D)18; }
.moment-card.has-grade-E { background: #2a1010; border-color: var(--E)99; box-shadow: 0 2px 12px var(--E)18; }
.moment-card.has-grade-F { background: #2a0d10; border-color: var(--F)99; box-shadow: 0 2px 12px var(--F)18; }

.moment-name {
  font-size: 0.82rem;
  color: var(--text);
  line-height: 1.4;
  font-weight: 500;
}

/* GRADE SELECTOR */
.grade-selector {
  display: flex;
  gap: 4px;
  flex-wrap: nowrap;
}
.grade-btn {
  flex: 1;
  min-width: 0;
  height: 34px;
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: 2px solid var(--border);
  background: var(--bg);
  color: var(--text-muted);
  padding: 0;
  transition: all 0.12s;
  font-family: 'DM Mono', monospace;
}
.grade-btn:hover {
  transform: scale(1.08);
  border-color: #4a5070;
  color: var(--text);
}
.grade-btn.active-A { background: var(--A)30; color: var(--A); border-color: var(--A); font-weight: 700; box-shadow: 0 0 8px var(--A)55; }
.grade-btn.active-B { background: var(--B)30; color: var(--B); border-color: var(--B); font-weight: 700; box-shadow: 0 0 8px var(--B)55; }
.grade-btn.active-C { background: var(--C)30; color: var(--C); border-color: var(--C); font-weight: 700; box-shadow: 0 0 8px var(--C)55; }
.grade-btn.active-D { background: var(--D)30; color: var(--D); border-color: var(--D); font-weight: 700; box-shadow: 0 0 8px var(--D)55; }
.grade-btn.active-E { background: var(--E)30; color: var(--E); border-color: var(--E); font-weight: 700; box-shadow: 0 0 8px var(--E)55; }
.grade-btn.active-F { background: var(--F)30; color: var(--F); border-color: var(--F); font-weight: 700; box-shadow: 0 0 8px var(--F)55; }
.grade-btn.active-SLASH { background: var(--slash)30; color: #aaa; border-color: #666; font-weight: 700; }

/* GRADE COLORS for final */
.grade-A { color: var(--A); }
.grade-B { color: var(--B); }
.grade-C { color: var(--C); }
.grade-D { color: var(--D); }
.grade-E { color: var(--E); }
.grade-F { color: var(--F); }
.grade-dash { color: var(--text-muted); }

/* STATS BAR */
.stats-bar {
  display: flex;
  gap: 1.5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.5rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}
.stat-item { text-align: center; }
.stat-value {
  font-family: 'Syne', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
}
.stat-label {
  font-size: 0.65rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 0.2rem;
}

/* ADD MOMENT */
.add-moment-row {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.5rem;
}
.add-moment-row input { flex: 1; }

/* OVERVIEW TABLE */
.overview-section {
  margin-top: 2rem;
}
.overview-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.75rem;
}
.overview-table th {
  text-align: left;
  padding: 0.5rem 0.75rem;
  color: var(--text-muted);
  font-weight: 400;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  border-bottom: 1px solid var(--border);
}
.overview-table td {
  padding: 0.5rem 0.75rem;
  border-bottom: 1px solid var(--border)88;
  vertical-align: middle;
}
.overview-table tr:hover td { background: var(--surface2); }

/* MODAL for class overview */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #000000cc;
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
  max-width: 900px;
  width: 95vw;
  max-height: 85vh;
  overflow-y: auto;
}
.modal h3 {
  font-family: 'Syne', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 1.5rem;
  display: flex;
  justify-content: space-between;
}
.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 0;
}
.modal-close:hover { color: var(--text); }

/* Note field */
.note-area {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  padding: 0.6rem 0.8rem;
  border-radius: 6px;
  resize: vertical;
  min-height: 70px;
  outline: none;
  transition: border 0.15s;
}
.note-area:focus { border-color: var(--accent); }

/* Responsive */
@media (max-width: 768px) {
  .main { grid-template-columns: 1fr; }
  .sidebar { max-height: 300px; border-right: none; border-bottom: 1px solid var(--border); }
  header, .toolbar { padding: 1.5rem; }
  .content { padding: 1.5rem; }
}

.pill {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 0.2rem 0.6rem;
  font-size: 0.65rem;
  color: var(--text-muted);
}

.tab-row {
  display: flex;
  gap: 0.25rem;
  margin-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: -1px;
}
.tab-btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  background: none;
  border: none;
  color: var(--text-muted);
  padding: 0.5rem 1rem;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  border-radius: 0;
  transition: all 0.15s;
}
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab-btn:hover { color: var(--text); }

</style>
</head>
<body>

<header>
  <div class="logo-block">
    <h1>Idrott<span>&</span>Hälsa</h1>
    <p>Betygsmatris · Åk 7–9 · Lgr22</p>
  </div>
  <div class="header-actions">
    <span class="pill">Klass: <strong id="className">—</strong></span>
    <button class="btn-ghost" onclick="setClassName()">Byt klass</button>
    <button class="btn-ghost" onclick="openOverview()">📊 Klassöversikt</button>
    <button class="btn-primary" onclick="exportData()">⬇ Exportera</button>
  </div>
</header>

<div class="toolbar">
  <span class="toolbar-label">Filter:</span>
  <select id="yearFilter" onchange="renderContent()">
    <option value="all">Alla år</option>
    <option value="7">År 7</option>
    <option value="8">År 8</option>
    <option value="9">År 9</option>
  </select>
  <select id="catFilter" onchange="renderContent()">
    <option value="all">Alla kategorier</option>
  </select>
  <div class="legend" style="margin-left:auto">
    <div class="legend-item"><div class="legend-dot" style="background:var(--A)"></div>A</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--B)"></div>B</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--C)"></div>C</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--D)"></div>D</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--E)"></div>E</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--F)"></div>F</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--slash)"></div>/</div>
  </div>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Elever <span style="color:var(--accent)" id="studentCount"></span></h3>
    <div class="student-list" id="studentList"></div>
    <div class="add-student-form">
      <input type="text" id="newStudentName" placeholder="Elevens namn..." onkeydown="if(event.key==='Enter')addStudent()">
      <button class="btn-primary" onclick="addStudent()">+ Lägg till elev</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="mainContent">
    <div class="no-student">
      <div class="big-icon">🏃</div>
      <p>Välj eller lägg till en elev för att börja</p>
    </div>
  </div>
</div>

<!-- OVERVIEW MODAL -->
<div class="modal-overlay" id="overviewModal" onclick="if(event.target===this)closeOverview()">
  <div class="modal">
    <h3>Klassöversikt <button class="modal-close" onclick="closeOverview()">✕</button></h3>
    <div id="overviewContent"></div>
  </div>
</div>

<script>
// ============================
// DATA MODEL
// ============================

const GRADES = ['A','B','C','D','E','F','/'];
const GRADE_POINTS = {A:6,B:5,C:4,D:3,E:2,F:1,'/':-1};
const GRADE_COLOR = {A:'var(--A)',B:'var(--B)',C:'var(--C)',D:'var(--D)',E:'var(--E)',F:'var(--F)','/':'var(--slash)'};

// Lgr22 Idrott & Hälsa moment — organized by category + year
const DEFAULT_MOMENTS = [
  // RÖRELSE
  {id:'friidrottspring', cat:'Rörelse', name:'Löpning / friidrottspring', year:7, color:'#4fffb0'},
  {id:'friidrott_hopp', cat:'Rörelse', name:'Hopp (höjd/längd)', year:7, color:'#4fffb0'},
  {id:'friidrott_kast', cat:'Rörelse', name:'Kast (kulstötning/spjut)', year:7, color:'#4fffb0'},
  {id:'simning', cat:'Rörelse', name:'Simning', year:7, color:'#4fffb0'},
  {id:'dans', cat:'Rörelse', name:'Dans', year:7, color:'#4fffb0'},
  {id:'gym_redskap', cat:'Rörelse', name:'Gymnastik & redskapsgymnastik', year:7, color:'#4fffb0'},
  {id:'bollspel', cat:'Rörelse', name:'Bollspel (fotboll/basket/handboll)', year:7, color:'#4fffb0'},
  {id:'innebandy', cat:'Rörelse', name:'Innebandy', year:7, color:'#4fffb0'},
  {id:'lek_spel', cat:'Rörelse', name:'Lek och spel', year:7, color:'#4fffb0'},
  {id:'orientering', cat:'Rörelse', name:'Orientering', year:7, color:'#4fffb0'},
  {id:'skridskor', cat:'Rörelse', name:'Skridskor / vinteraktiviteter', year:8, color:'#4fffb0'},
  {id:'skidor', cat:'Rörelse', name:'Skidor', year:8, color:'#4fffb0'},
  {id:'utomhusaktivitet', cat:'Rörelse', name:'Utomhusaktiviteter / friluftsliv', year:8, color:'#4fffb0'},
  {id:'beachvolley', cat:'Rörelse', name:'Beachvolley', year:8, color:'#4fffb0'},
  {id:'badminton', cat:'Rörelse', name:'Badminton / tennis / racketsport', year:9, color:'#4fffb0'},
  {id:'klattring', cat:'Rörelse', name:'Klättring', year:9, color:'#4fffb0'},

  // HÄLSA & LIVSSTIL
  {id:'konditionstest', cat:'Hälsa & Livsstil', name:'Konditionsprov / konditionstest', year:7, color:'#52d9ff'},
  {id:'styrka', cat:'Hälsa & Livsstil', name:'Styrka & rörlighet', year:7, color:'#52d9ff'},
  {id:'kost_halsa', cat:'Hälsa & Livsstil', name:'Kost och hälsa (prov)', year:8, color:'#52d9ff'},
  {id:'hemplan', cat:'Hälsa & Livsstil', name:'Hemträningsplanering', year:8, color:'#52d9ff'},
  {id:'pulspasset', cat:'Hälsa & Livsstil', name:'Pulsmätning & träningsanalys', year:8, color:'#52d9ff'},
  {id:'muskel_skelett', cat:'Hälsa & Livsstil', name:'Muskler och skelettet (prov)', year:9, color:'#52d9ff'},
  {id:'doping_droger', cat:'Hälsa & Livsstil', name:'Doping, droger & prestation', year:9, color:'#52d9ff'},

  // FRILUFTSLIV & UTEVISTELSE
  {id:'frilufts_teori', cat:'Friluftsliv & Utevistelse', name:'Friluftsliv – teori & planering', year:7, color:'#ffd166'},
  {id:'orientering_karta', cat:'Friluftsliv & Utevistelse', name:'Orientering med karta/kompass', year:7, color:'#ffd166'},
  {id:'natur_miljo', cat:'Friluftsliv & Utevistelse', name:'Natur & miljö – allemansrätten', year:8, color:'#ffd166'},
  {id:'utedag', cat:'Friluftsliv & Utevistelse', name:'Utedag / lägerskola', year:8, color:'#ffd166'},

  // IDROTT & SÄKERHET
  {id:'hlr', cat:'Idrott & Säkerhet', name:'HLR & hjärt-lungräddning', year:9, color:'#ff6b6b'},
  {id:'skadeforebyggande', cat:'Idrott & Säkerhet', name:'Skadeförebyggande & uppvärmning', year:7, color:'#ff6b6b'},
  {id:'simtag', cat:'Idrott & Säkerhet', name:'Simtag & livräddning', year:8, color:'#ff6b6b'},

  // RÖRELSEFÖRMÅGA & TEKNIK
  {id:'teknik_analys', cat:'Rörelseförmåga & Teknik', name:'Teknikanalys (videoinspelning)', year:9, color:'#c77dff'},
  {id:'motorik', cat:'Rörelseförmåga & Teknik', name:'Motoriska grundformer', year:7, color:'#c77dff'},
  {id:'koordination', cat:'Rörelseförmåga & Teknik', name:'Koordination & balans', year:7, color:'#c77dff'},
];

let state = {
  className: 'Klass 9A',
  students: [],
  activeStudentId: null,
  moments: JSON.parse(JSON.stringify(DEFAULT_MOMENTS)),
};

// Load from localStorage
try {
  const saved = localStorage.getItem('ih_grades_v2');
  if (saved) state = JSON.parse(saved);
} catch(e) {}

function save() {
  localStorage.setItem('ih_grades_v2', JSON.stringify(state));
}

// ============================
// HELPERS
// ============================

function getCategories() {
  const yearFilter = document.getElementById('yearFilter')?.value || 'all';
  const cats = [...new Set(state.moments
    .filter(m => yearFilter === 'all' || String(m.year) === yearFilter)
    .map(m => m.cat))];
  return cats;
}

function getMomentsByCategory(catFilter) {
  const yearFilter = document.getElementById('yearFilter')?.value || 'all';
  const catF = document.getElementById('catFilter')?.value || 'all';
  return state.moments.filter(m => {
    const yOk = yearFilter === 'all' || String(m.year) === yearFilter;
    const cOk = catF === 'all' || m.cat === catF;
    return yOk && cOk;
  });
}

function getStudentGrades(studentId) {
  const s = state.students.find(s => s.id === studentId);
  return s ? (s.grades || {}) : {};
}

function calcFinalGrade(studentId) {
  const grades = getStudentGrades(studentId);
  const vals = Object.values(grades).filter(g => g && g !== '/').map(g => GRADE_POINTS[g]).filter(v => v > 0);
  if (!vals.length) return '—';
  const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
  if (avg >= 5.5) return 'A';
  if (avg >= 4.5) return 'B';
  if (avg >= 3.5) return 'C';
  if (avg >= 2.5) return 'D';
  if (avg >= 1.5) return 'E';
  return 'F';
}

function getCatColor(cat) {
  const m = state.moments.find(x => x.cat === cat);
  return m ? m.color : '#888';
}

// ============================
// RENDER STUDENT LIST
// ============================

function renderSidebar() {
  const list = document.getElementById('studentList');
  document.getElementById('studentCount').textContent = `(${state.students.length})`;

  if (!state.students.length) {
    list.innerHTML = '<p style="font-size:0.72rem;color:var(--text-muted);padding:0.5rem 0">Inga elever ännu</p>';
    return;
  }

  list.innerHTML = state.students.map(s => {
    const fg = calcFinalGrade(s.id);
    const gc = fg !== '—' ? `grade-${fg}` : 'grade-dash';
    const active = state.activeStudentId === s.id ? 'active' : '';
    return `<div class="student-item ${active}" onclick="selectStudent('${s.id}')">
      <span class="s-name">${s.name}</span>
      <span class="s-grade ${gc}">${fg}</span>
    </div>`;
  }).join('');
}

// ============================
// RENDER CONTENT
// ============================

function renderContent() {
  updateCatFilter();
  if (!state.activeStudentId) return;
  const student = state.students.find(s => s.id === state.activeStudentId);
  if (!student) return;

  const grades = student.grades || {};
  const fg = calcFinalGrade(student.id);
  const fgClass = fg !== '—' ? `grade-${fg}` : 'grade-dash';

  // Stats
  const allGrades = Object.values(grades).filter(g => g && g !== '/');
  const graded = allGrades.length;
  const total = getMomentsByCategory().length;

  let html = `
    <div class="student-header">
      <h2>${student.name} <span>Åk ${student.year || '7–9'}</span></h2>
      <div class="final-grade-block">
        <div>
          <div class="final-grade-label">Sammanvägt betyg</div>
          <div class="final-grade-value ${fgClass}">${fg}</div>
        </div>
      </div>
    </div>

    <div class="tab-row">
      <button class="tab-btn ${(student.tab||'moments')==='moments'?'active':''}" onclick="setTab('moments')">Moment</button>
      <button class="tab-btn ${(student.tab||'moments')==='notes'?'active':''}" onclick="setTab('notes')">Anteckningar</button>
    </div>`;

  if ((student.tab || 'moments') === 'moments') {
    html += `<div class="stats-bar">
      <div class="stat-item"><div class="stat-value" style="color:var(--accent)">${graded}</div><div class="stat-label">Bedömda</div></div>
      <div class="stat-item"><div class="stat-value">${total}</div><div class="stat-label">Totalt moment</div></div>
      <div class="stat-item"><div class="stat-value" style="color:var(--accent3)">${total-graded}</div><div class="stat-label">Återstår</div></div>
    </div>`;

    const filteredMoments = getMomentsByCategory();
    const cats = [...new Set(filteredMoments.map(m => m.cat))];

    cats.forEach(cat => {
      const moments = filteredMoments.filter(m => m.cat === cat);
      const catColor = getCatColor(cat);
      const catGrades = moments.map(m => grades[m.id]).filter(g => g && g !== '/');
      const catAvg = catGrades.length ? catGrades.map(g=>GRADE_POINTS[g]).reduce((a,b)=>a+b,0)/catGrades.length : null;
      const catAvgStr = catAvg ? ['F','E','D','C','B','A'][Math.round(catAvg)-1] || '—' : '—';

      html += `<div class="category-section">
        <div class="category-header">
          <div class="category-dot" style="background:${catColor}"></div>
          <span class="category-title">${cat}</span>
          <span class="category-avg">snitt: <strong>${catAvgStr}</strong></span>
        </div>
        <div class="moments-grid">`;

      moments.forEach(m => {
        const g = grades[m.id] || null;
        const hasGrade = g && g !== '/' ? `has-grade-${g}` : g === '/' ? 'has-grade-SLASH' : '';
        const borderStyle = '';

        html += `<div class="moment-card ${hasGrade}" style="${borderStyle}">
          <span class="moment-name">${m.name} <span style="font-size:0.62rem;color:var(--text-muted);opacity:.5">Åk${m.year}</span></span>
          <div class="grade-selector">`;

        GRADES.forEach(grade => {
          const isActive = g === grade ? `active-${grade === '/' ? 'SLASH' : grade}` : '';
          const label = grade;
          html += `<button class="grade-btn ${isActive}" onclick="setGrade('${m.id}','${grade}')" title="${grade === '/' ? 'Ej bedömd/frånvaro' : 'Betyg ' + grade}">${label}</button>`;
        });

        html += `</div></div>`;
      });

      html += `</div>`;

      // Add custom moment to this category
      html += `<div class="add-moment-row" style="margin-top:0.5rem">
        <input type="text" id="newMoment_${cat.replace(/\s/g,'_')}" placeholder="Lägg till moment i ${cat}..." onkeydown="if(event.key==='Enter')addMoment('${cat}')">
        <button class="btn-ghost" style="font-size:0.72rem" onclick="addMoment('${cat}')">+</button>
      </div>`;

      html += `</div>`;
    });

  } else {
    // NOTES TAB
    html += `<div style="display:flex;flex-direction:column;gap:1rem">
      <div>
        <div class="category-header" style="margin-bottom:0.75rem">
          <div class="category-dot" style="background:var(--accent)"></div>
          <span class="category-title">Anteckningar & observationer</span>
        </div>
        <textarea class="note-area" style="min-height:200px" id="studentNotes" placeholder="Skriv anteckningar om eleven här..." onchange="saveNote()">${student.notes || ''}</textarea>
      </div>
      <div>
        <div class="category-header" style="margin-bottom:0.75rem">
          <div class="category-dot" style="background:var(--accent3)"></div>
          <span class="category-title">Styrkor & utvecklingsområden</span>
        </div>
        <textarea class="note-area" id="studentStrengths" placeholder="Styrkor..." onchange="saveStrengths()">${student.strengths || ''}</textarea>
      </div>
    </div>`;
  }

  document.getElementById('mainContent').innerHTML = html;
}

function updateCatFilter() {
  const sel = document.getElementById('catFilter');
  if (!sel) return;
  const current = sel.value;
  const cats = [...new Set(state.moments.map(m => m.cat))];
  sel.innerHTML = '<option value="all">Alla kategorier</option>' +
    cats.map(c => `<option value="${c}" ${c===current?'selected':''}>${c}</option>`).join('');
}

// ============================
// ACTIONS
// ============================

function selectStudent(id) {
  state.activeStudentId = id;
  save();
  renderSidebar();
  renderContent();
}

function addStudent() {
  const inp = document.getElementById('newStudentName');
  const name = inp.value.trim();
  if (!name) return;
  const s = { id: Date.now().toString(), name, grades: {}, notes: '', strengths: '', tab: 'moments' };
  state.students.push(s);
  inp.value = '';
  state.activeStudentId = s.id;
  save();
  renderSidebar();
  renderContent();
}

function setGrade(momentId, grade) {
  const s = state.students.find(x => x.id === state.activeStudentId);
  if (!s) return;
  if (!s.grades) s.grades = {};
  if (s.grades[momentId] === grade) delete s.grades[momentId];
  else s.grades[momentId] = grade;
  save();
  renderSidebar();
  renderContent();
}

function addMoment(cat) {
  const key = 'newMoment_' + cat.replace(/\s/g,'_');
  const inp = document.getElementById(key);
  if (!inp || !inp.value.trim()) return;
  const name = inp.value.trim();
  const yearFilter = document.getElementById('yearFilter').value;
  const year = yearFilter !== 'all' ? parseInt(yearFilter) : 7;
  const catMoment = state.moments.find(m => m.cat === cat);
  const color = catMoment ? catMoment.color : '#888';
  state.moments.push({ id: 'custom_' + Date.now(), cat, name, year, color });
  save();
  renderContent();
}

function setTab(tab) {
  const s = state.students.find(x => x.id === state.activeStudentId);
  if (!s) return;
  s.tab = tab;
  save();
  renderContent();
}

function saveNote() {
  const s = state.students.find(x => x.id === state.activeStudentId);
  if (!s) return;
  s.notes = document.getElementById('studentNotes').value;
  save();
}

function saveStrengths() {
  const s = state.students.find(x => x.id === state.activeStudentId);
  if (!s) return;
  s.strengths = document.getElementById('studentStrengths').value;
  save();
}

function setClassName() {
  const n = prompt('Ange klassnamn:', state.className);
  if (n) { state.className = n; document.getElementById('className').textContent = n; save(); }
}

// ============================
// OVERVIEW MODAL
// ============================

function openOverview() {
  const modal = document.getElementById('overviewModal');
  modal.classList.add('open');

  const moments = state.moments;
  if (!state.students.length) {
    document.getElementById('overviewContent').innerHTML = '<p style="color:var(--text-muted)">Inga elever tillagda.</p>';
    return;
  }

  let html = `<div style="overflow-x:auto"><table class="overview-table">
    <thead><tr>
      <th>Elev</th>`;
  moments.slice(0,15).forEach(m => {
    html += `<th style="font-size:0.6rem;max-width:60px;white-space:normal;line-height:1.2">${m.name.slice(0,18)}</th>`;
  });
  html += `<th>Betyg</th></tr></thead><tbody>`;

  state.students.forEach(s => {
    const fg = calcFinalGrade(s.id);
    const fgClass = fg !== '—' ? `grade-${fg}` : 'grade-dash';
    html += `<tr><td style="font-weight:500">${s.name}</td>`;
    moments.slice(0,15).forEach(m => {
      const g = (s.grades || {})[m.id] || '';
      const gc = g && g !== '/' ? `style="color:${GRADE_COLOR[g]};font-weight:500"` : '';
      html += `<td ${gc}>${g || '·'}</td>`;
    });
    html += `<td class="${fgClass}" style="font-weight:700;font-size:1rem">${fg}</td></tr>`;
  });

  html += `</tbody></table></div>`;

  // Grade distribution
  const dist = {A:0,B:0,C:0,D:0,E:0,F:0,'—':0};
  state.students.forEach(s => { const fg = calcFinalGrade(s.id); dist[fg]++; });
  html += `<div style="margin-top:1.5rem">
    <h4 style="font-family:Syne,sans-serif;font-size:0.85rem;margin-bottom:0.75rem;color:var(--text-muted)">BETYGSFÖRDELNING</h4>
    <div style="display:flex;gap:1rem;flex-wrap:wrap">`;
  Object.entries(dist).forEach(([g,n]) => {
    if (!n) return;
    const gc = g !== '—' ? `grade-${g}` : 'grade-dash';
    html += `<div style="text-align:center">
      <div class="${gc}" style="font-family:Syne,sans-serif;font-size:1.8rem;font-weight:700">${g}</div>
      <div style="font-size:0.7rem;color:var(--text-muted)">${n} elev${n>1?'er':''}</div>
    </div>`;
  });
  html += `</div></div>`;

  document.getElementById('overviewContent').innerHTML = html;
}

function closeOverview() {
  document.getElementById('overviewModal').classList.remove('open');
}

// ============================
// EXPORT
// ============================

function exportData() {
  const rows = [['Elev', ...state.moments.map(m => m.name), 'Slutbetyg']];
  state.students.forEach(s => {
    rows.push([s.name, ...state.moments.map(m => (s.grades||{})[m.id]||''), calcFinalGrade(s.id)]);
  });
  const csv = rows.map(r => r.join('\t')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `betyg_${state.className}_${new Date().toISOString().slice(0,10)}.tsv`;
  a.click();
}

// ============================
// INIT
// ============================

document.getElementById('className').textContent = state.className;
updateCatFilter();
renderSidebar();

// If we had a previously selected student, show them
if (state.activeStudentId && state.students.find(s=>s.id===state.activeStudentId)) {
  renderContent();
}
</script>
</body>
</html>
